<!DOCTYPE html>
<html>
  <head>
    <title>My Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 40px auto;
        padding: 20px;
        background-color: #111111;
        color: #ffffff;
      }

      h1 {
        color: #e85d24;
        text-align: center;
      }

      h2 {
        color: white;
      }

     .box {
        color: orange;
     }

    #special {
         color: yellow;
     }

      p {
        line-height: 1.6;
      }

      img {
        width: 220px;
        border-radius: 20px;
        display: block;
        margin: 20px auto;
        border: 3px solid #e85d24;
      }

      a {
        color: #e85d24;
      }

      .box {
        background-color: #1e1e1e;
        padding: 15px;
        margin-top: 15px;
        border: 1px solid #444;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>

    <h1>Hi, I'm [your name]</h1>

    <h2>About me</h2>
    <p>Write a sentence or two about yourself here.</p>

    <h2>A site I like</h2>
    <p>Check out <a href="https://google.com">Google</a>.</p>

    <img src="https://placecats.com/200/150" alt="A placeholder cat photo">

  </body>
</html>
